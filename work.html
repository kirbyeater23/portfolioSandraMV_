<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandra Martínez Villacorta | Kirbyetaer</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="carga">
      <div class="cargaMain">
        <img src="assets/images/favicon.svg" alt="" />
      </div>
    </div>

    <div class="cursorPunto"></div>
    <div class="cursorLinea"></div>
    <header>
      <nav class="navegacionPrincipal">
        <a href="index.html"
          ><img
            class="imagenLogo"
            src="./assets/images/imagenLogo.webp"
            alt="Logo // Home"
        /></a>

        <ul class="paginas">
          <a class="pagAnex" href="work.html"><small>WORK</small></a>
          <a class="pagAnex" href="about.html"><small>ABOUT</small></a>
          <a class="pagAnex" href="contact.html"><small>CONTACT</small></a>
        </ul>
        <button type="button" class="menuHamburguesa" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </header>

    <main class="seccionWork">
      <div class="filtrosWork">
        <button class="filtroBtn filtroActivo" data-filtro="all">ALL</button>
        <span class="separadorFiltro">//</span>
        <button class="filtroBtn" data-filtro="editorial">EDITORIAL</button>
        <span class="separadorFiltro">//</span>
        <button class="filtroBtn" data-filtro="ilustracion">ILUSTRACION</button>
        <span class="separadorFiltro">//</span>
        <button class="filtroBtn" data-filtro="branding">BRANDING</button>
        <span class="separadorFiltro">//</span>
        <button class="filtroBtn" data-filtro="motion">MOTION</button>
      </div>

      <div class="gridWork" id="gridWork"></div>
    </main>

    <div id="rootModal"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrambleTextPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lemonadejs@5/dist/lemonade.min.js"></script>
    <script src="app/js/main.js"></script>
    <script src="app/js/work.js"></script>
    <script src="app/js/animations.js"></script>
    <script src="app/js/nav.js"></script>

    <footer class="footerGeneral">
      <div class="bloqueFooter">
        <div class="logoFooter">
          <img src="./assets/images/dab1.webp" alt="DAB" />
        </div>

        <nav class="navegacionFooter">
          <a href="index.html">HOME</a>
          <a href="work.html">WORK</a>
          <a href="about.html">ABOUT</a>
          <a href="contact.html">CONTACT</a>
        </nav>

        <div class="redesSociales">
          <a
            href="https://www.instagram.com/kirbyeater23/"
            target="_blank"
            rel="noopener noreferrer"
            >Instagram</a
          >
          <a
            href="https://www.linkedin.com/in/sandra-martínez-villacorta-61a30a294/"
            target="_blank"
            rel="noopener noreferrer"
            >Linkedin</a
          >
        </div>

        <div class="emailFooter">
          <small>samavillac@gmail.com</small>
        </div>
      </div>

      <small class="creditosFooter"
        >WEBSITE BY SANDRA MARTÍNEZ VILLACORTA</small
      >
    </footer>
  </body>
</html>
