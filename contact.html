<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Sandra Martínez Villacorta</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrambleTextPlugin.min.js" defer></script>
    <script src="app/js/contact.js" defer></script>
    <script src="app/js/animations.js" defer></script>
    <script src="app/js/nav.js" defer></script>
  </head>

  <body>
    <div class="carga">
      <div class="cargaMain">
        <img src="assets/images/favicon.svg" alt="" />
      </div>
    </div>


    <div class="cursorPunto"></div>
    <div class="cursorLinea"></div>
    <header>
      <nav class="navegacionPrincipal">
        <a href="index.html"
          ><img
            class="imagenLogo"
            src="./assets/images/imagenLogo.webp"
            alt="Logo // Home"
        /></a>
        <ul class="paginas">
          <a class="pagAnex" href="work.html"><small>WORK</small></a>
          <a class="pagAnex" href="about.html"><small>ABOUT</small></a>
          <a class="pagAnex" href="contact.html"><small>CONTACT</small></a>
        </ul>
        <button type="button" class="menuHamburguesa" aria-label="Menú">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </header>

    <main class="seccionContact">
      <h1 class="tituloContact">HABLEMOS*</h1>

      <div class="contenidoContact">
        <div class="textoContact">
          <img
            src="./assets/images/contact/puedoAyudarte.svg"
            alt="Puedo ayudarte a hacer tu idea realidad"
          />
        </div>

        <form class="formularioContact" id="formularioContact" novalidate>
          <small class="etiquetaFormulario">RELLENA LOS DATOS</small>
          <div class="filaFormulario">
            <div class="campoFormulario">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" name="nombre" required />
            </div>
            <div class="campoFormulario">
              <label for="apellidos">Apellidos</label>
              <input type="text" id="apellidos" name="apellidos" required />
            </div>
          </div>

          <div class="campoFormulario campoServicio">
            <label for="servicio">Servicio que buscas</label>
            <div class="selectWrapper">
              <select id="servicio" name="servicio">
                <option value="" disabled selected></option>
                <option value="editorial">Editorial</option>
                <option value="ilustracion">Ilustración</option>
                <option value="branding">Branding</option>
                <option value="motion">Motion</option>
              </select>
              <span class="selectArrow">&#8964;</span>
            </div>
          </div>

          <div class="campoFormulario">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" name="correo" required />
          </div>

          <div class="campoFormulario">
            <label for="descripcion">Describe tu proyecto !</label>
            <textarea id="descripcion" name="descripcion" rows="5"></textarea>
          </div>

          <button type="submit" class="botonEnviar">TRABAJEMOS JUNTOS!</button>
          <p id="mensajeFormulario" class="mensajeFormulario"></p>
        </form>
      </div>
    </main>

    <footer class="footerGeneral">
      <div class="bloqueFooter">
        <div class="logoFooter">
          <img src="./assets/images/dab1.webp" alt="DAB" />
        </div>

        <nav class="navegacionFooter">
          <a href="index.html">HOME</a>
          <a href="work.html">WORK</a>
          <a href="about.html">ABOUT</a>
          <a href="contact.html">CONTACT</a>
        </nav>

        <div class="redesSociales">
          <a href="https://www.instagram.com/kirbyeater23/" target="_blank" rel="noopener noreferrer">Instagram</a>
          <a href="https://www.linkedin.com/in/sandra-martínez-villacorta-61a30a294/" target="_blank" rel="noopener noreferrer">Linkedin</a>
        </div>

        <div class="emailFooter">
          <small>samavillac@gmail.com</small>
        </div>
      </div>s

      <small class="creditosFooter"
        >WEBSITE BY SANDRA MARTÍNEZ VILLACORTA</small
      >
    </footer>
  </body>
</html>
